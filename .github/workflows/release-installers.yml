name: Release desktop installers

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows MSI
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Accept WiX EULA
        shell: pwsh
        run: |
          dotnet tool restore
          dotnet tool run wix -- eula accept wix7

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build MSI
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^desktop-(?<version>\d+\.\d+\.\d+(?:-rc\.\d+)?)$') {
            throw "Release tag must match desktop-x.y.z or desktop-x.y.z-rc.n. Got: $env:RELEASE_TAG"
          }
          $version = $Matches.version
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File ./scripts/windows/package-desktop-msi.ps1 -Version $version

      - name: Upload MSI to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/windows/*.msi --clobber

  macos:
    name: Build macOS installers
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build macOS installers
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^desktop-([0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?)$ ]]; then
            echo "Release tag must match desktop-x.y.z or desktop-x.y.z-rc.n. Got: $RELEASE_TAG" >&2
            exit 1
          fi
          version="${BASH_REMATCH[1]}"
          ./scripts/macos/package-desktop-dmg.sh --version "$version"
          ./scripts/macos/package-desktop-pkg.sh --version "$version" --skip-build

      - name: Upload macOS installers to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/macos/*.dmg dist/macos/*.pkg --clobber
