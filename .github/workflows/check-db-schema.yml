name: Check daemon database schema

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  db-schema:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check generated daemon database schema
        run: deno task db-schema:check
